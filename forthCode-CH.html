<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--//10-->>
    <ul id="tasks"></ul>
    <!--//28-->>
    <button id="btn">Load Data</button>
    <pre id="output"></pre>
    <!--//35-->>
    <div id="chart"></div>

    <script>
        //A) JSON.parse() :
        //1
        let data = '{"name":"John","age":30}';
        let obj = JSON.parse(data);
        console.log(obj.name); // Output: John
        //2
        let studentsJSON = '[{"name":"Ali"}, {"name":"Lina"}]';
        let students = JSON.parse(studentsJSON);
        for(let i=0;i<students.length;i++){
            console.log(students[i].name);
        }
        //3
        let info = '{"user":{"name":"Sara","scores":{"math":90}}}';
        let Info=JSON.parse(info);
        console.log(Info.user.scores.math); // Output: 90
        //4
          let obj4 = {name: "Sara", age: 25};
            let jsonText = JSON.stringify(obj4);
            let newObj4 = JSON.parse(jsonText);
            console.log(newObj4);
        //5
        let data5 = '{"name":"Adam","age":22}';
        let obj5 = JSON.parse(data5);
        obj5.age = 30;
        console.log(obj5);
        //6
        let text = '{"active":true,"data":null}';
        let obj6 = JSON.parse(text);
        console.log(typeof obj6.active);
        console.log(typeof obj6.data);
        //7
        let text7 = '{"grades":[50,60,70]}';
        let obj7 = JSON.parse(text7);
        let sum = 0;
        for (let i = 0; i < obj7.grades.length; i++) {
            sum += obj7.grades[i];
        }
        console.log(sum);
        //8
        let productsJSON = '[{"name":"Phone","price":100},{"name":"Pen","price":10},{"name":"Book","price":60}]';
        let products = JSON.parse(productsJSON);
        products.forEach(product => {
            if (product.price > 50) {
                console.log(product.name);
            }
        });
        //9
        let text9 = '{"created":"2024-01-10"}';
        let obj9 = JSON.parse(text9);
        let date = new Date(obj9.created);
        console.log(date);
        //10   
        let tasksJSON = '["Study","Eat","Sleep"]';
        let tasks = JSON.parse(tasksJSON);
        let ul = document.getElementById("tasks");
        tasks.forEach(task => {
            let li = document.createElement("li");
            li.textContent = task;
            ul.appendChild(li);
        });
        //B) JSON.stringify() :
        //11
        let user = {name: "Mona", age: 28};
        let json11 = JSON.stringify(user);
        console.log(json11);
        //12
        let obj12 = {
            name: "Ali",
            skills: ["HTML", "CSS", "JavaScript"]
        };
        let json12 = JSON.stringify(obj12);
        console.log(json12);
        //13
        let settings = {theme: "dark", lang: "en"};
        let json13 = JSON.stringify(settings);
        localStorage.setItem("settings", json13);
        //14
        let user14 = {username:"admin", password:"1234"};
        let json14 = JSON.stringify(user14, ["username"]);
        console.log(json14);
        //15
        let obj15 = {
            created: new Date()
        };
        let json15 = JSON.stringify(obj15);
        console.log(json15);
        //16
        let obj16 = {
            name:"Test",
            action:function(){return 5;}
        };
        let json16 = JSON.stringify(obj16);
        console.log(json16);
        //17
        let user17 = {name:"Ali", age:25};
        let json17 = JSON.stringify(user17, null, 4);
        console.log(json17);
        //18
        let invoice = {
            product: "Laptop",
            price: 1000,
            quantity: 2
        };
        let json18 = JSON.stringify(invoice);
        console.log(json18.length);
        //19
        let user19 = {
            name: "Omar",
            tasks: ["Study", "Exercise", "Read"]
        };
        let json19 = JSON.stringify(user19);
        console.log(json19);
        //20
        let data20 = {
            users: [
                {name:"Ali", age:20},
                {name:"Lina", age:22}
            ]
        };
        let json20 = JSON.stringify(data20);
        console.log(json20);
        let json = JSON.stringify(data20);
        let obj20 = JSON.parse(json);
        obj20.users.forEach(user => {
            let p = document.createElement("p");
            p.textContent = user.name + " - " + user.age;
            document.body.appendChild(p);
        });
        console.log("--------------------------------------------------------------");
        //C) JSON + APIs :
        //21
        fetch("https://jsonplaceholder.typicode.com/users")
        .then(response => response.json())
        .then(users => {
            users.forEach(user => {
                console.log(user.name);
            });
        });
        //22
        fetch("https://jsonplaceholder.typicode.com/posts/1")
        .then(res => res.json())
        .then(post => {
            let h2 = document.createElement("h2");
            h2.textContent = post.title;
            document.body.appendChild(h2);
        });
        //23
        fetch("https://jsonplaceholder.typicode.com/todos")
        .then(res => res.json())
        .then(todos => {
            todos.forEach(todo => {
                if (todo.completed === true) {
                    console.log(todo.title);
                }
            });
        });
        //24
        fetch("https://jsonplaceholder.typicode.com/photos")
        .then(res => res.json())
        .then(photos => {
            let img = document.createElement("img");
            img.src = photos[0].url;
            document.body.appendChild(img);
        });
        //25
        fetch("https://jsonplaceholder.typicode.com/posts", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: "Hello",
                body: "Test post",
                userId: 1
            })
        })
        .then(res => res.json())
        .then(data => console.log(data));
        //26
        fetch("https://jsonplaceholder.typicode.com/users/1")
        .then(res => res.json())
        .then(user => {

            let card = document.createElement("div");

            card.innerHTML = `
                <h3>${user.name}</h3>
                <p>${user.email}</p>
                <p>${user.phone}</p>
            `;

            document.body.appendChild(card);
        });
        //27
        fetch("https://jsonplaceholder.typicode.com/comments")
        .then(res => res.json())
        .then(comments => {

            let ul = document.createElement("ul");

            comments.slice(0,5).forEach(comment => {
                let li = document.createElement("li");
                li.textContent = comment.name;
                ul.appendChild(li);
            });

            document.body.appendChild(ul);
        });
        //28
        document.getElementById("btn").onclick = function(){
        fetch("https://jsonplaceholder.typicode.com/posts/1")
        .then(res => res.json())
        .then(data => {
            document.getElementById("output").textContent = JSON.stringify(data,null,2);
        });
        };
        //29
        fetch("https://jsonplaceholder.typicode.com/users/1")
        .then(res => res.json())
        .then(data => {

            let pre = document.createElement("pre");

            pre.textContent = JSON.stringify(data,null,2);

            document.body.appendChild(pre);
        });
        //30
        fetch("https://jsonplaceholder.typicode.com/posts")
        .then(res => res.json())
        .then(products => {

            let table = document.createElement("table");

            products.slice(0,5).forEach(p => {

                let row = document.createElement("tr");

                row.innerHTML = `
                <td>${p.id}</td>
                <td>${p.title}</td>
                `;

                table.appendChild(row);
            });

            document.body.appendChild(table);
        });
        //31
        try {

        let text = '{"name":"Ali", age:20}'; 

        let obj = JSON.parse(text);

        console.log(obj);

        } catch(error) {

        console.log("Invalid JSON");

        }
        //32
        fetch("https://jsonplaceholder.typicode.com/users")
        .then(res => res.json())
        .then(users => {

            let search = "Leanne";

            let results = users.filter(user => user.name.includes(search));

            results.forEach(user => {
                let p = document.createElement("p");
                p.textContent = user.name;
                document.body.appendChild(p);
            });

        });
        //D) JSON + Local Storage :
        //33
        let settingsJSON = '{"theme":"dark","language":"en"}';
        let settings33 = JSON.parse(settingsJSON);
        let dashboard = document.getElementById("dashboard");
        dashboard.innerHTML = `
        <h2>Dashboard</h2>
        <p>Theme: ${settings33.theme}</p>
        <p>Language: ${settings33.language}</p>
        `;

        if(settings33.theme === "dark"){
            document.body.style.background = "black";
            document.body.style.color = "white";
        }
        //34
        fetch("https://jsonplaceholder.typicode.com/users/1")
        .then(res => res.json())
        .then(user => {

            let settings = {
                theme: "dark",
                language: "en"
            };

            let mergedObject = {
                ...user,
                ...settings
            };

            console.log(mergedObject);

        });
        //35
        fetch("https://jsonplaceholder.typicode.com/posts")
        .then(res => res.json())
        .then(data => {

            let chart = document.getElementById("chart");

            data.slice(0,10).forEach(item => {

                let bar = document.createElement("div");

                bar.style.height = (item.id * 10) + "px";
                bar.style.width = "30px";
                bar.style.backgroundColor = "blue";
                bar.style.margin = "5px";
                bar.style.display = "inline-block";

                chart.appendChild(bar);

            });

        });

    </script>
</body>
</html>
